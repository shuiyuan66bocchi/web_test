<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shuiyuan - 个人名片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar-section {
            margin-bottom: 25px;
        }

        .avatar-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid rgba(37, 117, 252, 0.2);
            box-shadow: 0 8px 20px rgba(37, 117, 252, 0.3);
            background-color: #f0f8ff;
        }

        .avatar-upload {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: #2575fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 117, 252, 0.4);
            transition: all 0.3s ease;
        }

        .avatar-upload:hover {
            background: #1a68e8;
            transform: scale(1.1);
        }

        .avatar-upload i {
            font-size: 18px;
        }

        #upload-input {
            display: none;
        }

        .name {
            font-size: 32px;
            font-weight: 700;
            color: #1a3a8f;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .title {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            font-weight: 500;
        }

        .intro {
            background: rgba(37, 117, 252, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            line-height: 1.6;
            color: #333;
            border-left: 4px solid #2575fc;
        }

        .intro h3 {
            color: #1a3a8f;
            margin-bottom: 10px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .intro h3 i {
            color: #2575fc;
        }

        .contact {
            margin-bottom: 30px;
        }

        .contact h3 {
            color: #1a3a8f;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .contact-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(37, 117, 252, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 140px;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .contact-item:hover {
            background: rgba(37, 117, 252, 0.2);
            transform: translateY(-3px);
        }

        .contact-item i {
            font-size: 20px;
            color: #2575fc;
            margin-right: 10px;
        }

        .contact-item span {
            font-weight: 500;
        }

        .copy-btn {
            margin-left: 8px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 14px;
            transition: color 0.3s;
        }

        .copy-btn:hover {
            color: #2575fc;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            max-width: 200px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2575fc, #1a68e8);
            color: white;
            box-shadow: 0 6px 15px rgba(37, 117, 252, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #1a68e8, #0d5cd8);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(37, 117, 252, 0.4);
        }

        .btn-secondary {
            background: rgba(37, 117, 252, 0.1);
            color: #2575fc;
            border: 2px solid rgba(37, 117, 252, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(37, 117, 252, 0.2);
            transform: translateY(-3px);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .notification.show {
            opacity: 1;
            visibility: visible;
        }

        footer {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            width: 100%;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px;
                border-radius: 20px;
            }

            .avatar-container {
                width: 120px;
                height: 120px;
            }

            .name {
                font-size: 28px;
            }

            .contact-items {
                flex-direction: column;
                align-items: center;
            }

            .contact-item {
                width: 100%;
            }

            .buttons {
                flex-direction: column;
                align-items: center;
            }

            .btn {
                width: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="avatar-section">
            <div class="avatar-container">
                <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80" alt="头像" class="avatar" id="avatar">
                <div class="avatar-upload" id="upload-btn">
                    <i class="fas fa-camera"></i>
                </div>
                <input type="file" id="upload-input" accept="image/*">
            </div>
            <h1 class="name">shuiyuan</h1>
            <p class="title">前端开发者 | 技术爱好者</p>
        </div>

        <div class="intro">
            <h3><i class="fas fa-quote-left"></i> 关于我</h3>
            <p>嗨，我是 shuiyuan！一个热爱编程、喜欢探索新技术的前端开发者。喜欢简洁优雅的代码和设计，相信技术可以让生活更美好。目前专注于 Web 开发和用户体验设计，闲暇时喜欢阅读、摄影和分享知识。</p>
        </div>

        <div class="contact">
            <h3><i class="fas fa-address-book"></i> 联系我</h3>
            <div class="contact-items">
                <a href="mailto:example@example.com" class="contact-item" id="email-item">
                    <i class="fas fa-envelope"></i>
                    <span>Email</span>
                    <button class="copy-btn" data-text="example@example.com"><i class="far fa-copy"></i></button>
                </a>
                <a href="https://github.com" target="_blank" class="contact-item">
                    <i class="fab fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="#" class="contact-item" id="wechat-item">
                    <i class="fab fa-weixin"></i>
                    <span>微信</span>
                    <button class="copy-btn" data-text="shuiyuan_wechat"><i class="far fa-copy"></i></button>
                </a>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-primary" id="export-btn">
                <i class="fas fa-camera"></i>
                导出名片图片
            </button>
            <button class="btn btn-secondary" id="reset-btn">
                <i class="fas fa-redo"></i>
                重置头像
            </button>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <footer>
        <p>© 2026 shuiyuan 的个人名片 | 纯前端实现</p>
    </footer>

    <script>
        // DOM 元素
        const avatar = document.getElementById('avatar');
        const uploadBtn = document.getElementById('upload-btn');
        const uploadInput = document.getElementById('upload-input');
        const exportBtn = document.getElementById('export-btn');
        const resetBtn = document.getElementById('reset-btn');
        const notification = document.getElementById('notification');
        const copyButtons = document.querySelectorAll('.copy-btn');
        const emailItem = document.getElementById('email-item');
        const wechatItem = document.getElementById('wechat-item');

        // 默认头像URL（用于重置）
        const defaultAvatarUrl = 'https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?ixlib=rb-4.0.3&auto=format&fit=crop&w=500&q=80';

        // 显示通知
        function showNotification(message, duration = 2000) {
            notification.textContent = message;
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, duration);
        }

        // 头像上传功能
        uploadBtn.addEventListener('click', () => {
            uploadInput.click();
        });

        uploadInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.match('image.*')) {
                showNotification('请选择图片文件！', 3000);
                return;
            }

            const reader = new FileReader();

            reader.onload = function(event) {
                avatar.src = event.target.result;
                // 保存到本地存储
                localStorage.setItem('customAvatar', event.target.result);
                showNotification('头像上传成功！', 2000);
            };

            reader.onerror = function() {
                showNotification('图片读取失败，请重试！', 3000);
            };

            reader.readAsDataURL(file);
        });

        // 重置头像
        resetBtn.addEventListener('click', () => {
            avatar.src = defaultAvatarUrl;
            localStorage.removeItem('customAvatar');
            showNotification('头像已重置为默认！', 2000);
        });

        // 检查本地存储中是否有自定义头像
        const savedAvatar = localStorage.getItem('customAvatar');
        if (savedAvatar) {
            avatar.src = savedAvatar;
        }

        // 复制功能
        copyButtons.forEach(button => {
            button.addEventListener('click', function(e) {
                e.stopPropagation(); // 防止触发父元素点击事件
                const textToCopy = this.getAttribute('data-text');

                navigator.clipboard.writeText(textToCopy).then(() => {
                    showNotification('已复制到剪贴板: ' + textToCopy, 2000);
                }).catch(err => {
                    console.error('复制失败: ', err);
                    showNotification('复制失败，请手动复制', 3000);
                });
            });
        });

        // 导出名片图片功能
        exportBtn.addEventListener('click', () => {
            showNotification('正在生成图片...', 3000);

            // 使用html2canvas库需要引入，这里提供备选方案
            // 由于纯前端限制，我们提供两种方案：
            // 1. 提示用户使用浏览器截图工具
            // 2. 如果用户已引入html2canvas，则使用它

            // 方案1：提示用户手动截图
            const card = document.getElementById('card');
            card.style.boxShadow = '0 20px 40px rgba(0, 0, 0, 0.15)'; // 确保阴影显示

            setTimeout(() => {
                showNotification('请使用浏览器截图工具 (Ctrl+Shift+S 或 Cmd+Shift+S) 截图保存', 5000);

                // 可选：临时添加边框以便截图
                card.style.border = '2px dashed #2575fc';
                setTimeout(() => {
                    card.style.border = 'none';
                }, 2000);
            }, 500);

            // 方案2：如果检测到html2canvas库则使用（注释掉，因为用户要求纯前端）
            /*
            if (typeof html2canvas !== 'undefined') {
                html2canvas(card, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'shuiyuan-名片.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    showNotification('名片图片已生成并下载！', 3000);
                }).catch(err => {
                    console.error('导出失败:', err);
                    showNotification('导出失败，请尝试手动截图', 3000);
                });
            } else {
                showNotification('未检测到截图库，请手动截图或引入html2canvas', 5000);
            }
            */
        });

        // 联系项目点击事件
        emailItem.addEventListener('click', (e) => {
            if (e.target.classList.contains('copy-btn')) {
                return; // 复制按钮已处理
            }
            window.location.href = 'mailto:example@example.com';
        });

        wechatItem.addEventListener('click', (e) => {
            if (e.target.classList.contains('copy-btn')) {
                return; // 复制按钮已处理
            }
            showNotification('微信: shuiyuan_wechat (已复制到剪贴板)', 3000);
            navigator.clipboard.writeText('shuiyuan_wechat').catch(() => {
                // 忽略错误
            });
        });

        // 页面加载时显示欢迎消息
        window.addEventListener('load', () => {
            setTimeout(() => {
                showNotification('欢迎来到 shuiyuan 的个人名片！', 3000);
            }, 1000);
        });
    </script>
</body>
</html>
